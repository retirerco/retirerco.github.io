<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Retirer — Playlists</title>
    <link rel="icon"
        href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="black"/></svg>'
        type="image/svg+xml">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            background: #000;
            color: #e8e8e8;
            font-family: system-ui, -apple-system, sans-serif;
        }

        main {
            padding: 40px;
        }

        .site-title span {
            opacity: 0.25;
        }

        .site-title a {
            color: inherit;
            text-decoration: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 0 24px;
        }

        .size-toggle {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .size-toggle button {
            background: rgba(232, 232, 232, 0.25);
            border: none;
            cursor: pointer;
            padding: 0;
            border-radius: 2px;
        }

        .size-toggle button.active {
            background: #e8e8e8;
        }

        .size-toggle button[data-size="small"] {
            width: 8px;
            height: 8px;
        }

        .size-toggle button[data-size=""] {
            width: 12px;
            height: 12px;
        }

        .size-toggle button[data-size="large"] {
            width: 16px;
            height: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 32px;
        }

        .grid.small {
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
        }

        .grid.large {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }

        @media (max-width: 520px) {
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .grid a {
            display: block;
            width: 100%;
            padding: 0;
            border: 0;
            background: none;
            cursor: pointer;
        }

        .grid img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
        }

        dialog {
            padding: 0;
            border: 0;
            background: none;
            margin: auto;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.75);
        }

        dialog iframe {
            width: 500px;
            height: 500px;
            border: 0;
            display: block;
        }

        @media (max-width: 540px) {
            dialog iframe {
                width: 90vw;
                height: 90vw;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="header">
            <div class="site-title"><a href="mailto:contact@retirer.co">Retirer</a> <span> — Playlists </span></div>
            <div class="size-toggle" id="toggle">
                <button data-size="small"></button>
                <button data-size="" class="active"></button>
                <button data-size="large"></button>
            </div>
        </div>
        <div class="grid" id="grid"></div>
    </main>

    <dialog id="dialog">
        <iframe id="player" src="about:blank" allow="encrypted-media" allowfullscreen></iframe>
    </dialog>

    <script>
        const grid = document.getElementById("grid");
        const dialog = document.getElementById("dialog");
        const player = document.getElementById("player");

        document.getElementById("toggle").addEventListener("click", (e) => {
            if (!e.target.dataset.size && e.target.dataset.size !== "") return;
            grid.className = "grid " + e.target.dataset.size;
            document.querySelectorAll(".size-toggle button").forEach(b => b.classList.remove("active"));
            e.target.classList.add("active");
        });

        const playlists = [
            {id: "014", spotify: "07w35AGr9rCUFwzAEoIBle"},
            {id: "013", spotify: "5ytqLwiMqfF9prbYJHJmPu"},
            {id: "012", spotify: "4N0L6G5ipjheqZ7PZPhANx"},
            {id: "011", spotify: "3dpXodEkgaHAGY1wF6Ybex"},
            {id: "010", spotify: "4IhqCytg6qoLX3W9CHGTjs"},
            {id: "009", spotify: "3MC8Me8xgrJ5M5aEm6JB3A"},
            {id: "008", spotify: "035Y5DvWcP5tujp0qlnWbE"},
            {id: "007", spotify: "1E0nU8Hd9FHqWwUGL70pLS"},
            {id: "006", spotify: "4uCI2vlPfQVMMA499bOc02"},
            {id: "005", spotify: "47JlM8ib3tbXG7i1xCHgp6"},
            {id: "004", spotify: "2C7ay5GbXKDGcAfZyvVGW4"},
            {id: "003", spotify: "12HUUB9n3hFm4ojmY3yCkI"},
            {id: "002", spotify: "7pe0duwoEtH6TL6V2u7bLx"},
            {id: "001", spotify: "484k4XCtMDK6BhgJQRFORy"},
        ];

        const byId = new Map(playlists.map((pl) => [pl.id, pl]));
        const embedUrl = (pl) => `https://open.spotify.com/embed/playlist/${pl.spotify}?utm_source=generator&theme=0`;
        const playlistPath = (id) => `#${id}`;

        function openPlaylist(pl, updateUrl = true) {
            player.src = embedUrl(pl);
            if (!dialog.open) dialog.showModal();
            if (updateUrl) location.hash = pl.id;
        }

        function closePlaylist(updateUrl = true) {
            if (dialog.open) dialog.close();
            player.src = "about:blank";
            if (updateUrl && location.hash) history.pushState(null, "", location.pathname);
        }

        function routeFromHash() {
            const pl = byId.get(location.hash.replace("#", ""));
            if (pl) openPlaylist(pl, false);
            else closePlaylist(false);
        }

        dialog.addEventListener("click", (e) => {if (e.target === dialog) closePlaylist();});
        dialog.addEventListener("cancel", (e) => {e.preventDefault(); closePlaylist();});
        window.addEventListener("hashchange", routeFromHash);

        playlists.forEach((pl) => {
            const btn = document.createElement("a");
            btn.href = playlistPath(pl.id);
            const img = document.createElement("img");
            img.src = `covers/${pl.id}.webp`;
            img.alt = `retirer ${pl.id}`;
            img.loading = "lazy";
            btn.appendChild(img);
            btn.addEventListener("click", (e) => {e.preventDefault(); openPlaylist(pl);});
            grid.appendChild(btn);
        });

        routeFromHash();
    </script>
</body>

</html>
